---
layout: default
---
<article class="p-4 md:p-8 space-y-4">
  <div class="text-sm text-slate-600">
    <a href="{{ '/' | relative_url }}" class="underline text-orange-500 hover:text-orange-600">← Retour au portfolio</a>
    <span class="mx-2 text-slate-400">/</span>
    <a href="{{ '/blog/' | relative_url }}" class="underline text-orange-500 hover:text-orange-600">Blog</a>
  </div>
  <header class="space-y-2">
    <p class="text-orange-400 font-semibold">{{ page.date | date: "%-d %B %Y" }}</p>
    <h1 class="text-4xl font-bold text-slate-900">{{ page.title }}</h1>
    {% if page.description %}
      <p class="text-slate-700">{{ page.description }}</p>
    {% endif %}
    {% if page.tags %}
      <div class="flex flex-wrap gap-2">
        {% for tag in page.tags %}
          <span class="bg-orange-100 text-orange-500 px-2 py-1 rounded text-sm">{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>
  <div class="space-y-4 text-slate-800 leading-relaxed">
    {{ content }}
  </div>
</article>
