<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}" class="h-full">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="{{ site.author | default: 'Paul Martinez' }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Chilanka&display=swap"
    rel="stylesheet">

  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    window.toggleTheme = function () {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
  </script>
  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}" />

  {% seo %}
</head>

{% assign _lang = page.lang | default: 'fr' %}
{% assign t = site.data.i18n[_lang] %}

<body class="font-sans min-h-screen text-zinc-900 dark:text-zinc-100 dark:bg-slate-900 antialiased selection:bg-amber-200 selection:dark:bg-amber-300/90 selection:text-zinc-800">

  <!-- Fixed gradient background — viewport-pinned, never tiles or scrolls -->
  <!-- <div class="fixed inset-0 -z-10 bg-gradient-to-br from-[#FFE6CF] to-amber-300 dark:from-[#96513E] dark:to-amber-950"></div>

  <!-- Top fade overlay — content softly fades as it scrolls behind the navbar -->
  <!-- <div class="fixed top-0 inset-x-0 h-24 z-40 pointer-events-none bg-gradient-to-b from-[#FFE6CF]/80 to-transparent dark:from-[#96513E]/70 dark:to-transparent"></div> -->

  {% include header.html %}

  <div class="relative min-h-screen">
    <main class="max-w-4xl mx-auto px-4 py-2 sm:py-6 relative z-10">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>

  <script src="https://unpkg.com/lucide@1.23.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>

  <script>
    document.addEventListener('click', function (e) {
      var m = document.getElementById('mobile-menu');
      var b = document.getElementById('hamburger-btn');
      if (m && !m.classList.contains('hidden') && b && !m.contains(e.target) && !b.contains(e.target)) {
        m.classList.add('hidden');
      }
    }, true);
  </script>
</body>

</html>
