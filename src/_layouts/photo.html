<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}" class="h-full dark">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="{{ site.author | default: 'Paul Martinez' }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <script>
    (function(){
      var t=localStorage.getItem('theme');
      if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
        document.documentElement.classList.add('dark');
      }
    })();
    window.toggleTheme=function(){
      var isDark=document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme',isDark?'dark':'light');
    };
  </script>
  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}" />

  {% seo %}
</head>

<body class="font-sans min-h-screen bg-black text-zinc-100 antialiased">

  <!-- Fond noir fixe -->
  <div class="fixed inset-0 -z-10 bg-black"></div>

  <!-- Fade noir en haut pour lisibilité de la nav -->
  <div class="fixed top-0 inset-x-0 h-24 z-40 pointer-events-none
              bg-gradient-to-b from-black/70 to-transparent"></div>

  {% include header.html %}

  {{ content }}

  <footer class="text-center text-xs text-zinc-700 py-6">
    Paul Martinez &copy; {{ site.time | date: "%Y" }}
  </footer>

  <script>
    document.addEventListener('click', function(e) {
      var m = document.getElementById('mobile-menu');
      var b = document.getElementById('hamburger-btn');
      if (m && !m.classList.contains('hidden') && b && !m.contains(e.target) && !b.contains(e.target)) {
        m.classList.add('hidden');
      }
    }, true);
  </script>
</body>

</html>
