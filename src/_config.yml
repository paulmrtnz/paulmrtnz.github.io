title: "Paul Martinez"
description: "Portfolio et blog de Paul Martinez"
url: "https://paulmrtnz.github.io"
baseurl: ""
lang: fr
timezone: Europe/Paris
author: Paul Martinez
# REQUIRED avant d'ajouter de vraies entrées dans _data/photos.yml : ton cloud
# name Cloudinary (public — visible dans chaque URL de livraison, pas un secret).
# Le trouver sur le dashboard Cloudinary, section "Product Environment Settings".
cloudinary_cloud_name: "your-cloud-name"
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Paul Martinez
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

permalink: /blog/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - _site/
  - node_modules/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - css/input.css
